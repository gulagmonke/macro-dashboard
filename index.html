<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TQQQ / SQQQ Signal Model</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Syne:wght@400;600;700;800&display=swap');

:root {
  --bg: #080810;
  --surface: #0e0e1a;
  --surface2: #13131f;
  --border: #1a1a2e;
  --border2: #252540;
  --text: #ddddf0;
  --muted: #55556a;
  --muted2: #7777a0;
  --bull: #00e5a0;
  --bear: #ff3366;
  --neutral: #7777cc;
  --accent: #4455ff;
  --bull-glow: rgba(0,229,160,0.12);
  --bear-glow: rgba(255,51,102,0.12);
  --neutral-glow: rgba(119,119,204,0.1);
  --bull-dim: rgba(0,229,160,0.08);
  --bear-dim: rgba(255,51,102,0.08);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  line-height: 1.5;
  min-height: 100vh;
}
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
  pointer-events: none; z-index: 0; opacity: 0.5;
}
.app { position: relative; z-index: 1; }

/* TOPBAR */
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 28px;
  border-bottom: 1px solid var(--border);
  background: rgba(8,8,16,0.92);
  backdrop-filter: blur(10px);
  position: sticky; top: 0; z-index: 100;
}
.logo { display: flex; align-items: baseline; gap: 12px; }
.logo-title { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 800; letter-spacing: -0.3px; color: #fff; }
.logo-sub { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted2); }
.topbar-right { display: flex; align-items: center; gap: 14px; }
.refresh-btn {
  display: flex; align-items: center; gap: 7px;
  background: var(--surface2); border: 1px solid var(--border2);
  border-radius: 6px; color: var(--text);
  font-family: 'DM Mono', monospace; font-size: 11px;
  padding: 7px 14px; cursor: pointer; transition: all 0.2s; letter-spacing: 0.04em;
}
.refresh-btn:hover { border-color: var(--accent); color: #fff; }
.refresh-btn.loading { opacity: 0.5; pointer-events: none; }
.spin { display: inline-block; }
.refresh-btn.loading .spin { animation: spin 0.9s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.last-upd { font-size: 10px; color: var(--muted); letter-spacing: 0.04em; }
.fetch-pills { display: flex; gap: 7px; flex-wrap: wrap; }
.pill {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 3px 9px; border-radius: 20px; font-size: 10px;
  letter-spacing: 0.03em; border: 1px solid transparent; transition: all 0.3s;
}
.pill.ok { background: var(--bull-dim); border-color: rgba(0,229,160,0.2); color: var(--bull); }
.pill.err { background: var(--bear-dim); border-color: rgba(255,51,102,0.2); color: var(--bear); }
.pill.loading { background: var(--neutral-glow); border-color: rgba(119,119,204,0.2); color: var(--neutral); }
.pill.manual { background: rgba(255,170,50,0.07); border-color: rgba(255,170,50,0.18); color: #ffaa33; }
.pdot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }
.pill.loading .pdot { animation: blink 1s ease-in-out infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.25} }

/* MAIN */
.main { padding: 24px 28px; display: flex; flex-direction: column; gap: 22px; }

/* SIGNAL STRIP */
.sig-strip { display: flex; gap: 2px; height: 3px; }
.ss { flex: 1; border-radius: 2px; background: var(--border2); transition: background 0.4s; }

/* HERO */
.hero { display: grid; grid-template-columns: 260px 1fr; gap: 18px; }
.comp-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 26px 22px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  position: relative; overflow: hidden; transition: border-color 0.5s;
}
.comp-card::after {
  content: ''; position: absolute; inset: 0;
  background: var(--cg, transparent); transition: background 0.5s; pointer-events: none;
}
.comp-label { font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted2); margin-bottom: 2px; }
.comp-score {
  font-family: 'Syne', sans-serif; font-size: 76px; font-weight: 800;
  line-height: 1; letter-spacing: -5px; transition: color 0.4s; color: var(--neutral);
}
.comp-sig {
  font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700;
  letter-spacing: 0.18em; text-transform: uppercase; margin-top: 4px;
  transition: color 0.4s; color: var(--neutral);
}
.pos-badge {
  margin-top: 12px; padding: 5px 14px; border-radius: 20px;
  font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 700;
  letter-spacing: 0.08em; text-transform: uppercase; transition: all 0.4s;
}
.pb-bull { background: var(--bull-dim); color: var(--bull); border: 1px solid rgba(0,229,160,0.22); }
.pb-bear { background: var(--bear-dim); color: var(--bear); border: 1px solid rgba(255,51,102,0.22); }
.pb-neu { background: var(--neutral-glow); color: var(--neutral); border: 1px solid rgba(119,119,204,0.18); }
.gauge-wrap { width: 100%; margin-top: 16px; }
.gauge-track { width: 100%; height: 5px; background: var(--border2); border-radius: 3px; overflow: hidden; position: relative; }
.gauge-fill { height: 100%; border-radius: 3px; position: absolute; left: 0; transition: width 0.6s cubic-bezier(0.4,0,0.2,1), background 0.4s; }
.gauge-ticks { display: flex; justify-content: space-between; margin-top: 5px; font-size: 9px; color: var(--muted); letter-spacing: 0.03em; }

/* CAT SUMMARIES */
.cat-sums { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 14px; }
.cat-sum {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; padding: 16px 18px;
  display: flex; flex-direction: column; gap: 7px;
  position: relative; overflow: hidden; transition: border-color 0.3s;
}
.cat-sum::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0;
  width: 3px; background: var(--cc); border-radius: 0 2px 2px 0;
}
.cs-head { display: flex; align-items: center; justify-content: space-between; }
.cs-name { font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; }
.cs-score { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; letter-spacing: -1px; transition: color 0.3s; }
.cs-bar { height: 3px; background: var(--border2); border-radius: 2px; overflow: hidden; }
.cs-fill { height: 100%; border-radius: 2px; transition: width 0.5s, background 0.4s; }
.cs-count { font-size: 9px; color: var(--muted); letter-spacing: 0.04em; }

/* SECTION */
.sec-head { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
.sec-title { font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted2); white-space: nowrap; }
.sec-line { flex: 1; height: 1px; background: var(--border); }
.sec-note { font-size: 9px; color: var(--muted); letter-spacing: 0.05em; white-space: nowrap; }

/* CATEGORIES GRID */
.cats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.cat-block { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
.cat-hdr {
  display: flex; align-items: center; justify-content: space-between;
  padding: 11px 16px; border-bottom: 1px solid var(--border);
  background: rgba(255,255,255,0.012);
}
.cat-hdr-name { font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; }
.cat-wt {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 16px; border-bottom: 1px solid var(--border);
  font-size: 10px; color: var(--muted);
}
.cat-wt input[type=range] { flex: 1; accent-color: var(--accent); cursor: pointer; }
.wt-val { color: var(--text); min-width: 26px; text-align: right; }
.ind-row {
  display: grid; grid-template-columns: 1fr 88px 40px 26px;
  align-items: center; gap: 8px; padding: 9px 16px;
  border-bottom: 1px solid rgba(26,26,46,0.55); transition: background 0.15s;
}
.ind-row:last-child { border-bottom: none; }
.ind-row:hover { background: rgba(255,255,255,0.018); }
.ind-name { font-size: 11px; color: var(--text); }
.ind-hint { font-size: 9px; color: var(--muted); margin-top: 1px; }
.inp-wrap input, .inp-wrap select {
  width: 100%; background: var(--bg); border: 1px solid var(--border2);
  border-radius: 5px; color: var(--text);
  font-family: 'DM Mono', monospace; font-size: 11px;
  padding: 5px 8px; outline: none; transition: border-color 0.2s, background 0.3s, color 0.3s;
}
.inp-wrap input:focus, .inp-wrap select:focus { border-color: var(--accent); }
.inp-wrap input.auto { border-color: rgba(68,85,255,0.35); background: rgba(68,85,255,0.05); color: #aabeff; }
.mbar { height: 4px; background: var(--border2); border-radius: 2px; overflow: hidden; }
.mbar-fill { height: 100%; border-radius: 2px; transition: width 0.5s, background 0.4s; }
.sdot {
  width: 26px; height: 26px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 700; flex-shrink: 0; transition: all 0.3s;
}
.sd-bull { background: var(--bull-dim); color: var(--bull); }
.sd-bear { background: var(--bear-dim); color: var(--bear); }
.sd-neu { background: var(--neutral-glow); color: var(--muted2); }

/* BOTTOM */
.bot { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.panel { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 20px; }
.panel h3 {
  font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700;
  letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted2);
  margin-bottom: 14px; display: flex; align-items: center; justify-content: space-between;
}
.save-btn {
  font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.06em;
  background: var(--accent); color: #fff; border: none;
  border-radius: 4px; padding: 4px 12px; cursor: pointer; transition: opacity 0.2s; text-transform: uppercase;
}
.save-btn:hover { opacity: 0.78; }
textarea {
  width: 100%; background: var(--bg); border: 1px solid var(--border2);
  border-radius: 6px; color: var(--text); font-family: 'DM Mono', monospace;
  font-size: 11px; padding: 10px; resize: vertical; min-height: 90px; outline: none; line-height: 1.6;
}
textarea:focus { border-color: var(--accent); }
.hist-row {
  display: grid; grid-template-columns: 76px 50px 1fr 68px;
  gap: 8px; padding: 8px 0; border-bottom: 1px solid var(--border);
  font-size: 11px; align-items: center;
}
.hist-row:last-child { border-bottom: none; }
.h-date { color: var(--muted); font-size: 10px; }
.h-score { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 15px; }
.h-note { color: var(--muted2); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 10px; }
.h-sig { font-size: 9px; text-align: right; letter-spacing: 0.06em; text-transform: uppercase; }
.empty { color: var(--muted); font-size: 11px; }

@media (max-width: 960px) {
  .hero { grid-template-columns: 1fr; }
  .cats-grid { grid-template-columns: 1fr; }
  .bot { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div class="app">

<div class="topbar">
  <div class="logo">
    <span class="logo-title">TQQQ / SQQQ</span>
    <span class="logo-sub">Signal Model</span>
  </div>
  <div class="topbar-right">
    <div class="fetch-pills" id="pills"></div>
    <span class="last-upd" id="lastUpd">Not fetched</span>
    <button class="refresh-btn" id="refreshBtn" onclick="fetchAll()">
      <span class="spin">⟳</span>&nbsp;Refresh
    </button>
  </div>
</div>

<div class="main">
  <div class="sig-strip" id="strip"></div>

  <!-- HERO -->
  <div class="hero">
    <div class="comp-card" id="compCard">
      <div class="comp-label">Composite Score</div>
      <div class="comp-score" id="compScore">—</div>
      <div class="comp-sig" id="compSig">awaiting data</div>
      <div class="pos-badge pb-neu" id="posBadge">● Hold / Cash</div>
      <div class="gauge-wrap">
        <div class="gauge-track">
          <div class="gauge-fill" id="gaugeFill" style="width:50%;background:var(--neutral)"></div>
        </div>
        <div class="gauge-ticks"><span>−100</span><span>−50</span><span>0</span><span>+50</span><span>+100</span></div>
      </div>
    </div>
    <div class="cat-sums" id="catSums"></div>
  </div>

  <!-- INDICATORS -->
  <div>
    <div class="sec-head">
      <span class="sec-title">Factor Indicators</span>
      <div class="sec-line"></div>
      <span class="sec-note">BLUE = AUTO-FETCHED &nbsp;·&nbsp; ✎ = MANUAL ENTRY</span>
    </div>
    <div class="cats-grid" id="catsGrid"></div>
  </div>

  <!-- BOTTOM -->
  <div class="bot">
    <div class="panel">
      <h3>Trade Notes <button class="save-btn" onclick="saveSnap()">Save Snapshot</button></h3>
      <textarea id="notes" placeholder="Enter your thesis...&#10;e.g. Fed on hold, HY spreads tightening, NDX above 200MA → tilt TQQQ"></textarea>
    </div>
    <div class="panel">
      <h3>Snapshots</h3>
      <div id="histContainer"><div class="empty">No snapshots yet.</div></div>
    </div>
  </div>
</div>
</div>

<script>
const FRED_KEY = '922c3915c90df5c095da13084111e04d';
const FRED_URL = (s, n=2) =>
  `https://api.stlouisfed.org/fred/series/observations?series_id=${s}&api_key=${FRED_KEY}&file_type=json&sort_order=desc&limit=${n}`;

async function fredObs(series, n=2) {
  try {
    const r = await fetch(FRED_URL(series, n));
    const d = await r.json();
    return (d.observations || []).filter(o => o.value !== '.');
  } catch { return []; }
}

async function fredVal(series) {
  const obs = await fredObs(series, 2);
  if (!obs.length) return null;
  const v = parseFloat(obs[0].value);
  return isNaN(v) ? null : v;
}

async function yahooCloses(symbol, range='300d', interval='1d') {
  try {
    const r = await fetch(`https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(symbol)}?interval=${interval}&range=${range}`);
    const d = await r.json();
    return d.chart.result[0].indicators.quote[0].close.filter(x => x != null);
  } catch { return null; }
}

function calcRSI(closes, p=14) {
  if (closes.length < p+1) return 50;
  let g=0, l=0;
  for (let i=closes.length-p; i<closes.length; i++) {
    const diff = closes[i]-closes[i-1];
    if (diff>0) g+=diff; else l-=diff;
  }
  const rs = g/(l||0.0001);
  return +(100 - 100/(1+rs)).toFixed(1);
}

function calcEMA(data, p) {
  const k = 2/(p+1); let e = data[0];
  return data.map((v,i) => { if(i===0) return e; e = v*k+e*(1-k); return e; });
}

function calcMACD(closes) {
  const ef = calcEMA(closes,12), es = calcEMA(closes,26);
  const ml = ef.map((v,i)=>v-es[i]);
  const sl = calcEMA(ml.slice(25),9);
  const hist = sl.map((s,i)=>ml[25+i]-s);
  return hist;
}

const CATS = [
  {
    id:'macro', name:'Macro Regime', color:'#5577ff', dw:30,
    inds:[
      { id:'yield_curve', name:'Yield Curve (2s10s)', hint:'bps · negative = inverted',
        type:'number', unit:'bp', th:{bull:20,bear:-30},
        fetch: async()=>{ const v=await fredVal('T10Y2Y'); return v!=null?+(v*100).toFixed(1):null; }
      },
      { id:'hy_spreads', name:'HY Credit Spreads (OAS)', hint:'bps · widening = bearish',
        type:'number', unit:'bp', th:{bull:350,bear:500},
        fetch: async()=>fredVal('BAMLH0A0HYM2')
      },
      { id:'real_ffr', name:'Real Fed Funds Rate', hint:'FFR − CPI YoY',
        type:'number', unit:'%', th:{bull:-1,bear:2.5},
        fetch: async()=>{
          const obs = await fredObs('CPIAUCSL', 14);
          const ffr = await fredVal('FEDFUNDS');
          if(!obs.length || ffr==null) return null;
          const v0=parseFloat(obs[0].value), v12=parseFloat((obs[12]||obs[obs.length-1]).value);
          if(isNaN(v0)||isNaN(v12)||v12===0) return null;
          const cpiYoy=(v0/v12-1)*100;
          return +(ffr-cpiYoy).toFixed(2);
        }
      },
      { id:'fed_stance', name:'Fed Policy Stance', hint:'hiking / neutral / cutting',
        type:'select', options:['hiking','neutral','cutting'],
        sigs:{'hiking':-1,'neutral':0,'cutting':1}, fetch:null
      },
      { id:'m2_yoy', name:'M2 Growth YoY', hint:'% · positive = liquidity bull',
        type:'number', unit:'%', th:{bull:3,bear:-2},
        fetch: async()=>{
          const obs=await fredObs('M2SL',14);
          if(obs.length<13) return null;
          const v0=parseFloat(obs[0].value), v12=parseFloat(obs[12].value);
          if(isNaN(v0)||isNaN(v12)||v12===0) return null;
          return +((v0/v12-1)*100).toFixed(2);
        }
      },
    ]
  },
  {
    id:'growth', name:'Growth Cycle', color:'#00c896', dw:25,
    inds:[
      { id:'ism_mfg', name:'ISM Mfg PMI (NAPM)', hint:'>50 = expansion',
        type:'number', unit:'', th:{bull:52,bear:47},
        fetch: async()=>fredVal('NAPM')
      },
      { id:'lei_mom', name:'LEI MoM Change', hint:'% · direction of leading index',
        type:'number', unit:'%', th:{bull:0.1,bear:-0.3},
        fetch: async()=>{
          const obs=await fredObs('USSLIND',3);
          if(obs.length<2) return null;
          const v0=parseFloat(obs[0].value), v1=parseFloat(obs[1].value);
          if(isNaN(v0)||isNaN(v1)||v1===0) return null;
          return +((v0/v1-1)*100).toFixed(3);
        }
      },
      { id:'claims', name:'Initial Claims (4wk MA)', hint:'K · rising = stress',
        type:'number', unit:'K', th:{bull:230,bear:290},
        fetch: async()=>{ const v=await fredVal('IC4WSA'); return v!=null?+(v/1000).toFixed(1):null; }
      },
      { id:'gdp', name:'Real GDP Growth (latest)', hint:'% SAAR · BEA quarterly',
        type:'number', unit:'%', th:{bull:2.0,bear:0.5},
        fetch: async()=>fredVal('A191RL1Q225SBEA')
      },
    ]
  },
  {
    id:'technical', name:'Price & Trend', color:'#ffaa33', dw:30,
    inds:[
      { id:'ndx_200', name:'QQQ vs 200-Day SMA', hint:'% above/below · >5% = bull',
        type:'number', unit:'%', th:{bull:5,bear:-5},
        fetch: async()=>{
          const c=await yahooCloses('QQQ','300d','1d');
          if(!c||c.length<200) return null;
          const latest=c[c.length-1];
          const sma200=c.slice(-200).reduce((a,b)=>a+b,0)/200;
          return +((latest/sma200-1)*100).toFixed(2);
        }
      },
      { id:'ndx_rsi', name:'QQQ Weekly RSI (14)', hint:'>60 = bull · <40 = bear',
        type:'number', unit:'', th:{bull:60,bear:40},
        fetch: async()=>{
          const c=await yahooCloses('QQQ','2y','1wk');
          if(!c||c.length<15) return null;
          return calcRSI(c,14);
        }
      },
      { id:'macd_sig', name:'QQQ Weekly MACD', hint:'histogram direction',
        type:'select', options:['bullish cross','bullish','neutral','bearish','bearish cross'],
        sigs:{'bullish cross':1,'bullish':0.7,'neutral':0,'bearish':-0.7,'bearish cross':-1},
        fetch: async()=>{
          const c=await yahooCloses('QQQ','2y','1wk');
          if(!c||c.length<30) return null;
          const hist=calcMACD(c);
          if(hist.length<2) return null;
          const l=hist[hist.length-1], p=hist[hist.length-2];
          if(l>0&&p<=0) return 'bullish cross';
          if(l<0&&p>=0) return 'bearish cross';
          if(l>0&&l>=p) return 'bullish';
          if(l>0&&l<p) return 'neutral';
          if(l<0) return 'bearish';
          return 'neutral';
        }
      },
      { id:'breadth', name:'NDX % Above 200MA', hint:'% stocks · >60% = bull',
        type:'number', unit:'%', th:{bull:60,bear:40}, fetch:null
      },
    ]
  },
  {
    id:'sentiment', name:'Sentiment & Vol', color:'#ff5577', dw:15,
    inds:[
      { id:'vix', name:'VIX Level', hint:'<15 = calm · >25 = stress',
        type:'number', unit:'', th:{bull:15,bear:25},
        fetch: async()=>{
          const c=await yahooCloses('^VIX','5d','1d');
          if(!c||!c.length) return null;
          return +c[c.length-1].toFixed(2);
        }
      },
      { id:'vix_ts', name:'VIX Term Structure', hint:'VIX vs VIX3M · contango = calm',
        type:'select', options:['steep contango','contango','flat','backwardation','steep backwardation'],
        sigs:{'steep contango':1,'contango':0.6,'flat':0,'backwardation':-0.6,'steep backwardation':-1},
        fetch: async()=>{
          const [v1,v3]=await Promise.all([
            yahooCloses('^VIX','5d','1d'),
            yahooCloses('^VIX3M','5d','1d')
          ]);
          if(!v1||!v3) return null;
          const spot=v1[v1.length-1], vix3=v3[v3.length-1];
          const sp=vix3-spot;
          if(sp>3) return 'steep contango';
          if(sp>0.5) return 'contango';
          if(sp>-0.5) return 'flat';
          if(sp>-3) return 'backwardation';
          return 'steep backwardation';
        }
      },
      { id:'putcall', name:'Put/Call Ratio (10d MA)', hint:'>1.0 = fear · <0.7 = greedy',
        type:'number', unit:'', th:{bull:1.0,bear:0.7}, fetch:null
      },
      { id:'naaim', name:'NAAIM Exposure Index', hint:'% allocation · >80 = frothy',
        type:'number', unit:'%', th:{bull:40,bear:80}, fetch:null
      },
    ]
  }
];

// ── STATE ──
const S = { weights:{}, values:{}, history:[] };
CATS.forEach(c => {
  S.weights[c.id] = c.dw;
  c.inds.forEach(i => { S.values[i.id] = null; });
});

// ── SCORING ──
function scoreInd(ind, val) {
  if(val===null||val===''||val===undefined) return null;
  if(ind.type==='select') {
    const v=ind.sigs?.[val]; return v!==undefined?v:null;
  }
  const v=parseFloat(val); if(isNaN(v)) return null;
  const {bull,bear}=ind.th;
  if(bull>=bear) {
    if(v>=bull) return 1; if(v<=bear) return -1;
    return (v-bear)/(bull-bear)*2-1;
  } else {
    if(v<=bull) return 1; if(v>=bear) return -1;
    return (bear-v)/(bear-bull)*2-1;
  }
}

function computeAll() {
  const cs={};
  CATS.forEach(c=>{
    let sum=0,n=0;
    c.inds.forEach(i=>{ const s=scoreInd(i,S.values[i.id]); if(s!==null){sum+=s;n++;} });
    cs[c.id]=n>0?sum/n:null;
  });
  const tw=CATS.reduce((a,c)=>cs[c.id]!==null?a+S.weights[c.id]:a,0);
  let comp=0;
  if(tw>0) CATS.forEach(c=>{ if(cs[c.id]!==null) comp+=(S.weights[c.id]/tw)*cs[c.id]; });
  return {cs, comp:comp*100};
}

function col(s) { return s>35?'var(--bull)':s<-35?'var(--bear)':'var(--neutral)'; }
function lbl(s) { return s>60?'STRONG BULL':s>35?'BULLISH':s<-60?'STRONG BEAR':s<-35?'BEARISH':'NEUTRAL'; }

// ── UPDATE UI ──
function updateUI() {
  const {cs,comp}=computeAll();
  const c=col(comp);

  // Composite
  document.getElementById('compScore').textContent=(comp>=0?'+':'')+Math.round(comp);
  document.getElementById('compScore').style.color=c;
  document.getElementById('compSig').textContent=lbl(comp);
  document.getElementById('compSig').style.color=c;
  const badge=document.getElementById('posBadge');
  badge.className='pos-badge '+(comp>35?'pb-bull':comp<-35?'pb-bear':'pb-neu');
  badge.textContent=comp>35?'▲ Long TQQQ':comp<-35?'▼ Long SQQQ':'● Hold / Cash';
  const card=document.getElementById('compCard');
  card.style.setProperty('--cg', comp>35?'var(--bull-glow)':comp<-35?'var(--bear-glow)':'var(--neutral-glow)');
  card.style.borderColor=comp>35?'rgba(0,229,160,0.18)':comp<-35?'rgba(255,51,102,0.18)':'var(--border)';
  const pct=Math.max(2,Math.min(98,(comp+100)/200*100));
  const gf=document.getElementById('gaugeFill');
  gf.style.width=pct+'%'; gf.style.background=c;

  // Cat summaries
  CATS.forEach(cat=>{
    const s=cs[cat.id]; const sc=s!==null?Math.round(s*100):null;
    const el=document.getElementById('cs-'+cat.id); if(!el) return;
    const scoreEl=el.querySelector('.cs-score');
    const fillEl=el.querySelector('.cs-fill');
    const cntEl=el.querySelector('.cs-count');
    const filled=cat.inds.filter(i=>S.values[i.id]!==null&&S.values[i.id]!=='').length;
    if(sc!==null){
      const cc=col(sc);
      scoreEl.textContent=(sc>=0?'+':'')+sc; scoreEl.style.color=cc;
      fillEl.style.width=Math.max(2,Math.min(98,(sc+100)/200*100))+'%'; fillEl.style.background=cc;
    } else { scoreEl.textContent='—'; scoreEl.style.color='var(--muted)'; fillEl.style.width='50%'; fillEl.style.background='var(--border2)'; }
    cntEl.textContent=`${filled}/${cat.inds.length} signals`;
  });

  // Ind rows
  CATS.forEach(cat=>cat.inds.forEach(ind=>{
    const s=scoreInd(ind,S.values[ind.id]);
    const dot=document.getElementById('dot-'+ind.id);
    const bar=document.getElementById('bar-'+ind.id);
    if(dot){
      if(s===null){dot.className='sdot sd-neu';dot.textContent='·';}
      else if(s>0.2){dot.className='sdot sd-bull';dot.textContent='▲';}
      else if(s<-0.2){dot.className='sdot sd-bear';dot.textContent='▼';}
      else{dot.className='sdot sd-neu';dot.textContent='–';}
    }
    if(bar){
      const p=s!==null?Math.max(2,Math.min(98,(s+1)/2*100)):50;
      bar.style.width=p+'%'; bar.style.background=s!==null?col(s*100):'var(--border2)';
    }
  }));

  // Strip
  const strip=document.getElementById('strip'); strip.innerHTML='';
  CATS.flatMap(c=>c.inds).forEach(ind=>{
    const s=scoreInd(ind,S.values[ind.id]);
    const seg=document.createElement('div'); seg.className='ss';
    if(s!==null) seg.style.background=col(s*100);
    strip.appendChild(seg);
  });
}

// ── BUILD DOM ──
function buildCatSums(){
  const cont=document.getElementById('catSums');
  CATS.forEach(cat=>{
    const el=document.createElement('div');
    el.className='cat-sum'; el.id='cs-'+cat.id;
    el.style.setProperty('--cc',cat.color);
    el.innerHTML=`
      <div class="cs-head">
        <span class="cs-name" style="color:${cat.color}">${cat.name}</span>
        <span class="cs-score">—</span>
      </div>
      <div class="cs-bar"><div class="cs-fill" style="width:50%"></div></div>
      <div class="cs-count">0/${cat.inds.length} signals</div>`;
    cont.appendChild(el);
  });
}

function buildCats(){
  const grid=document.getElementById('catsGrid');
  CATS.forEach(cat=>{
    const blk=document.createElement('div'); blk.className='cat-block';
    blk.innerHTML=`
      <div class="cat-hdr">
        <span class="cat-hdr-name" style="color:${cat.color}">${cat.name}</span>
      </div>
      <div class="cat-wt">
        <span>weight</span>
        <input type="range" min="0" max="50" value="${cat.dw}" oninput="setWeight('${cat.id}',this.value)">
        <span class="wt-val" id="wv-${cat.id}">${cat.dw}%</span>
      </div>`;
    cat.inds.forEach(ind=>{
      const row=document.createElement('div'); row.className='ind-row';
      const manual=ind.fetch===null;
      let inp;
      if(ind.type==='select'){
        inp=`<select id="inp-${ind.id}" onchange="manUp('${ind.id}',this.value)">
          <option value="">—</option>
          ${ind.options.map(o=>`<option value="${o}">${o}</option>`).join('')}
        </select>`;
      } else {
        inp=`<input type="number" id="inp-${ind.id}" placeholder="—" step="0.01" oninput="manUp('${ind.id}',this.value)">`;
      }
      row.innerHTML=`
        <div>
          <div class="ind-name">${ind.name}${manual?' <span style="color:var(--muted);font-size:9px">✎</span>':''}</div>
          <div class="ind-hint">${ind.hint}</div>
        </div>
        <div class="inp-wrap">${inp}</div>
        <div class="mbar"><div class="mbar-fill" id="bar-${ind.id}" style="width:50%"></div></div>
        <div class="sdot sd-neu" id="dot-${ind.id}">·</div>`;
      blk.appendChild(row);
    });
    grid.appendChild(blk);
  });
}

// ── FETCH ──
function setPill(id, status, label){
  const c=document.getElementById('pills');
  let el=document.getElementById('pl-'+id);
  if(!el){ el=document.createElement('div'); el.id='pl-'+id; c.appendChild(el); }
  el.className='pill '+status;
  el.innerHTML=`<div class="pdot"></div>${label}`;
}

async function fetchAll(){
  const btn=document.getElementById('refreshBtn');
  btn.classList.add('loading');

  setPill('fred','loading','FRED…');
  setPill('yahoo','loading','Yahoo…');

  const yahooIds=new Set(['ndx_200','ndx_rsi','macd_sig','vix','vix_ts']);
  const allFetchable=CATS.flatMap(c=>c.inds).filter(i=>i.fetch!==null);

  let fOk=0,fErr=0,yOk=0,yErr=0;

  await Promise.all(allFetchable.map(async ind=>{
    try {
      const val=await ind.fetch();
      const isY=yahooIds.has(ind.id);
      if(val!==null){
        S.values[ind.id]=val;
        const el=document.getElementById('inp-'+ind.id);
        if(el){
          el.value=val;
          if(ind.type!=='select') el.classList.add('auto');
        }
        isY?yOk++:fOk++;
      } else { isY?yErr++:fErr++; }
    } catch { yahooIds.has(ind.id)?yErr++:fErr++; }
  }));

  setPill('fred', fErr>fOk?'err':'ok', `FRED (${fOk})`);
  setPill('yahoo', yErr>yOk?'err':'ok', `Yahoo (${yOk})`);
  setPill('manual','manual','NAAIM · P/C · Breadth · Fed → manual');

  document.getElementById('lastUpd').textContent=
    'Updated '+new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});

  updateUI();
  btn.classList.remove('loading');
}

function manUp(id, val){
  S.values[id]=val===''?null:val;
  const el=document.getElementById('inp-'+id);
  if(el) el.classList.remove('auto');
  updateUI();
}

function setWeight(catId, val){
  S.weights[catId]=parseInt(val);
  document.getElementById('wv-'+catId).textContent=val+'%';
  updateUI();
}

// ── SNAPSHOTS ──
function saveSnap(){
  const {comp}=computeAll();
  const note=document.getElementById('notes').value.trim();
  const date=new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'2-digit'});
  S.history.unshift({date,score:Math.round(comp),note:note||'—'});
  renderHist();
}

function renderHist(){
  const c=document.getElementById('histContainer');
  if(!S.history.length){ c.innerHTML='<div class="empty">No snapshots yet.</div>'; return; }
  c.innerHTML=S.history.slice(0,10).map(h=>{
    const cc=col(h.score);
    return `<div class="hist-row">
      <span class="h-date">${h.date}</span>
      <span class="h-score" style="color:${cc}">${h.score>=0?'+':''}${h.score}</span>
      <span class="h-note" title="${h.note}">${h.note}</span>
      <span class="h-sig" style="color:${cc}">${lbl(h.score)}</span>
    </div>`;
  }).join('');
}

// ── INIT ──
buildCatSums();
buildCats();
updateUI();
fetchAll();
</script>
